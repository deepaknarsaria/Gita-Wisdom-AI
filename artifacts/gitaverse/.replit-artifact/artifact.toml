kind = "web"
previewPath = "/"
title = "GitaVerse"
version = "1.0.0"
id = "artifacts/gitaverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24510

[services.development]
run = "pnpm --filter @workspace/gitaverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gitaverse", "run", "build" ]
publicDir = "artifacts/gitaverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24510"
BASE_PATH = "/"
